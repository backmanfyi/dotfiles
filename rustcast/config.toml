# Toggle hotkey — ALT+SPACE matches the launcher convention on macOS without
# colliding with Spotlight (CMD+SPACE). RustCast normalises ALT == OPTION.
toggle_hotkey = "ALT+SPACE"

placeholder = "Search apps, files, ?web"

clear_on_hide = true
clear_on_enter = true

# DuckDuckGo for ?-suffix queries — matches ghostty's link-url defaults.
search_url = "https://duckduckgo.com/?q=%s"

haptic_feedback = false
show_trayicon = true

# Clipboard history hotkey — pick something that won't collide with the
# default toggle. Adjust freely.
clipboard_hotkey = "SUPER+SHIFT+V"

[theme]
# Match Ghostty's font for visual continuity across the terminal stack.
font = "SauceCodePro NFM Medium"

# Dawnfox (Rosé Pine Dawn) palette in normalised RGB (0-1).
# fg #575279 mauve   → 87/82/121
text_color       = [0.341, 0.322, 0.475]
# bg #faf4ed cream   → 250/244/237
background_color = [0.980, 0.957, 0.929]

background_opacity = 1.0
blur = false
show_icons = true
show_scroll_bar = true
